<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Portal de Datos Urbanos - La Habana</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #map {
            height: 100svh; 
            width: 100%;
            position: relative;
            z-index: 1;
        }
        
        /* Panel flotante de información superior izquierdo */
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            max-width: 300px;
        }
        .info-panel h1 { font-size: 18px; color: #333; margin-bottom: 5px; }
        .info-panel p { font-size: 12px; color: #666; }

        /* Contenedor personalizado abajo a la izquierda para las herramientas */
        .contenedor-herramientas-izq {
            position: absolute;
            bottom: 25px;
            left: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 2000;
        }

        /* Estilo para el botón flotante del Marcador (POI) */
        .btn-flotante {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: white;
            border: none;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: transform 0.2s ease, background-color 0.2s ease, color 0.2s ease;
        }

        .btn-flotante:active {
            transform: scale(0.9);
        }

        /* Estado activo cuando la herramienta de añadir puntos está encendida */
        .btn-flotante.activo-poi {
            background-color: #34c759 !important; /* Verde */
            color: white;
        }

        /* Integración y ajuste de la flechita de medición nativa */
        .leaflet-control-polylineMeasure {
            margin: 0 !important;
            border: none !important;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2) !important;
        }
        .leaflet-control-polylineMeasure a {
            border-radius: 50% !important;
            width: 44px !important;
            height: 44px !important;
            line-height: 44px !important;
            background-size: 22px 22px !important;
        }

        /* 🟢 CLASES CSS PARA CAMBIAR EL COLOR DE LOS MARCADORES DE LEAFLET */
        .marcador-rojo { filter: hue-rotate(140deg); }
        .marcador-verde { filter: hue-rotate(240deg); }
        .marcador-oro { filter: hue-rotate(50deg); }
        .marcador-violeta { filter: hue-rotate(90deg); }
        .marcador-azul { filter: hue-rotate(0deg); } /* Original */

        /* Estilos específicos para el menú de capas superior derecho */
        .leaflet-control-layers {
            border-radius: 8px !important;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.15) !important;
            padding: 10px !important;
            max-height: 85vh;
            overflow-y: auto;
        }

        @media (max-width: 767px) {
            .leaflet-control-layers {
                max-height: 60vh;
                width: 240px;
            }
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h1>Mapa de La Habana</h1>
        <p>Municipios</p>
    </div>

    <div id="map"></div>

    <div id="wrapper-herramientas" class="contenedor-herramientas-izq">
        <button id="btn-herramienta-poi" class="btn-flotante" title="Activar/Desactivar Marcador">📍</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.js"></script>
    
    <script>
        // 1. Inicializar el mapa
        const map = L.map('map', { zoomControl: true }).setView([23.05, -82.40], 11);
        map.zoomControl.setPosition('topright');

        // Geolocalización fija
        map.locate({ setView: true, maxZoom: 15 });

        let gpsMarker = null;
        let gpsCircle = null;

        function onLocationFound(e) {
            if (gpsMarker) { map.removeLayer(gpsMarker); }
            if (gpsCircle) { map.removeLayer(gpsCircle); }
            gpsCircle = L.circle(e.latlng, e.accuracy).addTo(map);
            gpsMarker = L.circleMarker(e.latlng, {
                color: '#fff', fillColor: '#007AFF', fillOpacity: 1, radius: 8, weight: 3
            }).addTo(map);
        }
        map.on('locationfound', onLocationFound);

        // Mapa base
        const mapaBase = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19, attribution: '© OpenStreetMap'
        }).addTo(map);

        // Contenedores de capas
        const grupoProvincia = L.layerGroup().addTo(map); 
        const grupoPOIs = L.layerGroup().addTo(map); 
        const capasMunicipios = {}; 
        let controlCapas; 

        let modoPoiActivo = false;

        // Inicializar la flechita de medición nativa
        const medidorLineal = new L.Control.PolylineMeasure({
            position: 'bottomleft',
            unit: 'metres',
            showBearings: false,
            clearMeasurementsOnStop: false,
            showUnitControl: false,
            tooltipTextDragandDrop: 'Arrastra para mover',
            tooltipTextDelete: 'Clic para borrar punto',
            tooltipTextMove: 'Clic para añadir punto',
            tooltipTextResume: 'Clic para continuar la línea',
            tooltipTextAdd: 'Clic para iniciar'
        });
        medidorLineal.addTo(map);

        // Acomodar la flechita arriba del marcador
        const elementoMedicion = medidorLineal.getContainer();
        const contenedorHerramientas = document.getElementById('wrapper-herramientas');
        contenedorHerramientas.insertBefore(elementoMedicion, contenedorHerramientas.firstChild);

        // Cargar provincia
        const urlProvincia = 'https://servidor-mapas.onrender.com/api/mapa';
        fetch(urlProvincia)
            .then(response => response.json())
            .then(data => {
                const capaProvincia = L.geoJSON(data, {
                    style: { color: '#2563eb', weight: 3, opacity: 0.9, fillColor: '#3b82f6', fillOpacity: 0.15 }
                }).addTo(grupoProvincia);
                map.fitBounds(capaProvincia.getBounds());
            });

        // Cargar municipios
        const urlMunicipios = 'https://servidor-mapas.onrender.com/api/municipios';
        fetch(urlMunicipios)
            .then(response => response.json())
            .then(data => {
                const nombresMunicipios = [...new Set(data.features.map(f => f.properties.nombre))].filter(Boolean);

                nombresMunicipios.forEach(nombreMuni => {
                    capasMunicipios[nombreMuni] = L.layerGroup().addTo(map);
                    L.geoJSON(data, {
                        filter: function(feature) { return feature.properties.nombre === nombreMuni; },
                        style: {
                            color: '#475569', weight: 1.5, opacity: 0.9,
                            fillColor: '#' + Math.floor((Math.abs(Math.sin(nombreMuni.charCodeAt(0))) * 16777215) % 16777215).toString(16).padStart(6, '0'),
                            fillOpacity: 0.45      
                        },
                        onEachFeature: function (feature, layer) { layer.bindPopup(`<strong>Municipio:</strong> ${nombreMuni}`); }
                    }).addTo(capasMunicipios[nombreMuni]);
                });

                const listaControles = {
                    "Límite Provincial": grupoProvincia,
                    "Mis Puntos Guardados": grupoPOIs
                };
                for (const nombre in capasMunicipios) { listaControles[`Municipio: ${nombre}`] = capasMunicipios[nombre]; }
                controlCapas = L.control.layers(null, listaControles, { collapsed: false }).addTo(map);
            });


        // ========================================================
        // GESTIÓN DEL BOTÓN MARCADOR CON COLORES SEPARADOS
        // ========================================================
        const btnPoi = document.getElementById('btn-herramienta-poi');
        L.DomEvent.disableClickPropagation(btnPoi);

        btnPoi.onclick = function(e) {
            if (e) e.stopPropagation();
            if (modoPoiActivo) {
                modoPoiActivo = false;
                btnPoi.classList.remove('activo-poi');
            } else {
                modoPoiActivo = true;
                btnPoi.classList.add('activo-poi');
            }
        };

        map.on('click', function(e) {
            if (!modoPoiActivo) return;

            // 🟢 NUEVO: Añadido selector de colores en el formulario de creación
            const contenidoCrear = `
                <div style="font-family: 'Segoe UI', sans-serif; min-width: 180px;">
                    <strong style="display:block; margin-bottom:8px; color:#333;">Nuevo Punto</strong>
                    <input type="text" id="crear-titulo" placeholder="Título (Ej. Iglesia)" style="width:100%; padding:5px; margin-bottom:6px; border-radius:4px; border:1px solid #ccc; font-size:12px;">
                    <textarea id="crear-desc" placeholder="Descripción..." rows="2" style="width:100%; padding:5px; margin-bottom:6px; border-radius:4px; border:1px solid #ccc; font-size:12px; resize:none;"></textarea>
                    
                    <label style="font-size:11px; color:#666; display:block; margin-bottom:3px;">Color del Marcador:</label>
                    <select id="crear-color" style="width:100%; padding:5px; margin-bottom:10px; border-radius:4px; border:1px solid #ccc; font-size:12px;">
                        <option value="marcador-azul">🔵 Azul (Estándar)</option>
                        <option value="marcador-rojo">🔴 Rojo</option>
                        <option value="marcador-verde">🟢 Verde</option>
                        <option value="marcador-oro">🟡 Oro / Amarillo</option>
                        <option value="marcador-violeta">🟣 Violeta</option>
                    </select>

                    <button id="btn-guardar-poi" style="width:100%; background:#28a745; color:white; border:none; padding:6px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:12px;">Fijar Punto</button>
                </div>
            `;

            const popupCrear = L.popup().setLatLng(e.latlng).setContent(contenidoCrear).openOn(map);

            setTimeout(() => {
                const btnGuardar = document.getElementById('btn-guardar-poi');
                if (btnGuardar) {
                    btnGuardar.onclick = function() {
                        const titulo = document.getElementById('crear-titulo').value || 'Punto sin título';
                        const desc = document.getElementById('crear-desc').value || 'Sin descripción';
                        const colorClase = document.getElementById('crear-color').value;

                        // Crear marcador
                        const nuevoMarcador = L.marker(e.latlng).addTo(grupoPOIs);
                        
                        // Guardar datos y el color seleccionado dentro del objeto
                        nuevoMarcador.datosPOI = { titulo: titulo, descripcion: desc, claseColor: colorClase };

                        // 🟢 Aplicar el filtro de color de forma inmediata a la imagen del marcador
                        nuevoMarcador.getElement().classList.add(colorClase);

                        function renderizarPopupLectura(marcador) {
                            const htmlLectura = `
                                <div style="font-family: 'Segoe UI', sans-serif; min-width: 160px;">
                                    <h3 style="margin:0 0 4px 0; font-size:14px; color:#333;">${marcador.datosPOI.titulo}</h3>
                                    <p style="margin:0 0 12px 0; font-size:12px; color:#666;">${marcador.datosPOI.descripcion}</p>
                                    <div style="display:flex; gap:6px;">
                                        <button class="btn-editar-poi" style="flex:1; background:#007aff; color:white; border:none; padding:4px; border-radius:4px; font-size:11px; cursor:pointer; font-weight:bold;">✏️ Editar</button>
                                        <button class="btn-borrar-poi" style="flex:1; background:#dc3545; color:white; border:none; padding:4px; border-radius:4px; font-size:11px; cursor:pointer; font-weight:bold;">🗑️ Borrar</button>
                                    </div>
                                </div>
                            `;
                            marcador.bindPopup(htmlLectura);
                        }

                        renderizarPopupLectura(nuevoMarcador);

                        nuevoMarcador.on('popupopen', function() {
                            // Borrar
                            const btnBorrar = document.querySelector('.btn-borrar-poi');
                            if (btnBorrar) { 
                                btnBorrar.onclick = function() { grupoPOIs.removeLayer(nuevoMarcador); }; 
                            }

                            // Editar (Ahora también permite re-editar el color)
                            const btnEditar = document.querySelector('.btn-editar-poi');
                            if (btnEditar) {
                                btnEditar.onclick = function() {
                                    const htmlEdicion = `
                                        <div style="font-family: 'Segoe UI', sans-serif; min-width: 180px;">
                                            <strong style="display:block; margin-bottom:6px; color:#333;">Editar Datos</strong>
                                            <input type="text" id="edit-titulo" value="${nuevoMarcador.datosPOI.titulo}" style="width:100%; padding:5px; margin-bottom:6px; border-radius:4px; border:1px solid #ccc; font-size:12px;">
                                            <textarea id="edit-desc" rows="2" style="width:100%; padding:5px; margin-bottom:6px; border-radius:4px; border:1px solid #ccc; font-size:12px; resize:none;">${nuevoMarcador.datosPOI.descripcion}</textarea>
                                            
                                            <label style="font-size:11px; color:#666; display:block; margin-bottom:3px;">Cambiar Color:</label>
                                            <select id="edit-color" style="width:100%; padding:5px; margin-bottom:10px; border-radius:4px; border:1px solid #ccc; font-size:12px;">
                                                <option value="marcador-azul" ${nuevoMarcador.datosPOI.claseColor === 'marcador-azul' ? 'selected' : ''}>🔵 Azul</option>
                                                <option value="marcador-rojo" ${nuevoMarcador.datosPOI.claseColor === 'marcador-rojo' ? 'selected' : ''}>🔴 Rojo</option>
                                                <option value="marcador-verde" ${nuevoMarcador.datosPOI.claseColor === 'marcador-verde' ? 'selected' : ''}>🟢 Verde</option>
                                                <option value="marcador-oro" ${nuevoMarcador.datosPOI.claseColor === 'marcador-oro' ? 'selected' : ''}>🟡 Oro</option>
                                                <option value="marcador-violeta" ${nuevoMarcador.datosPOI.claseColor === 'marcador-violeta' ? 'selected' : ''}>🟣 Violeta</option>
                                            </select>

                                            <button id="btn-actualizar-poi" style="width:100%; background:#ff9500; color:white; border:none; padding:6px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:12px;">Actualizar</button>
                                        </div>
                                    `;
                                    nuevoMarcador.setPopupContent(htmlEdicion);

                                    setTimeout(() => {
                                        const btnActualizar = document.getElementById('btn-actualizar-poi');
                                        if (btnActualizar) {
                                            btnActualizar.onclick = function() {
                                                // Remover color anterior de las clases CSS del elemento HTML
                                                nuevoMarcador.getElement().classList.remove(nuevoMarcador.datosPOI.claseColor);

                                                // Guardar nuevos datos
                                                nuevoMarcador.datosPOI.titulo = document.getElementById('edit-titulo').value || 'Sin título';
                                                nuevoMarcador.datosPOI.descripcion = document.getElementById('edit-desc').value || 'Sin descripción';
                                                nuevoMarcador.datosPOI.claseColor = document.getElementById('edit-color').value;
                                                
                                                // Asignar el nuevo filtro de color al elemento HTML
                                                nuevoMarcador.getElement().classList.add(nuevoMarcador.datosPOI.claseColor);

                                                renderizarPopupLectura(nuevoMarcador);
                                                map.closePopup();
                                            };
                                        }
                                    }, 50);
                                };
                            }
                        });

                        map.closePopup(popupCrear);
                    };
                }
            }, 100);
        });
    </script>
</body>
</html>
