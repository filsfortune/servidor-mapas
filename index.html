<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Portal de Datos Urbanos - La Habana</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #map {
            height: 100svh; 
            width: 100%;
            position: relative;
            z-index: 1;
        }
        
        /* Panel flotante de información */
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            max-width: 300px;
        }
        .info-panel h1 { font-size: 18px; color: #333; margin-bottom: 5px; }
        .info-panel p { font-size: 12px; color: #666; }

        /* ========================================================
           🔴 NUEVO CSS: DISEÑO RESPONSIVO PARA EL BOTÓN PLUS
           ======================================================== */
        
        /* Estilo del botón flotante "+" abajo a la derecha */
        .boton-plus-movil {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: #007aff; /* Azul nativo de iOS */
            color: white;
            font-size: 28px;
            font-weight: bold;
            border: none;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.3);
            z-index: 2000; /* Asegura quedar por encima del mapa y del zoom */
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        .boton-plus-movil:active {
            transform: scale(0.9); /* Pequeño rebote táctil */
        }

        /* Modificaciones exclusivas para pantallas móviles (iPhone) */
        @media (max-width: 767px) {
            
            /* Forzamos al cuadro blanco de Leaflet a comportarse como un panel flotante inferior */
            .leaflet-control-layers {
                position: absolute !important;
                bottom: 95px !important; /* Separado del botón Plus */
                right: 25px !important;
                margin: 0 !important;
                max-height: 50vh; /* Máximo la mitad de la pantalla para evitar colapsos */
                width: 280px;
                overflow-y: auto; /* Permite scroll si la lista de municipios crece */
                box-shadow: 0px 4px 15px rgba(0,0,0,0.25) !important;
                border: 1px solid #ddd !important;
                border-radius: 12px !important;
                padding: 15px !important;
                font-size: 16px !important; /* Tamaño cómodo para el dedo */
                
                /* Transición suave de apertura y cierre */
                transition: opacity 0.2s ease, transform 0.2s ease;
                transform-origin: bottom right;
            }

            /* Clase de control para esconder el menú */
            .leaflet-control-layers.menu-escondido {
                opacity: 0 !important;
                pointer-events: none !important;
                transform: scale(0.85) translateY(15px);
            }
        }

        /* Ocultar el botón Plus en computadoras para que el flujo clásico no se rompa */
        @media (min-width: 768px) {
            .boton-plus-movil {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h1></h1>
        <p>s</p>
    </div>

    <div id="map"></div>

    <button id="btn-toggle-capas" class="boton-plus-movil">+</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Inicializar el mapa sin botones de zoom por defecto
        const map = L.map('map', {
            zoomControl: false 
        }).setView([23.05, -82.40], 11);

        // Activar la geolocalización nativa de Leaflet
        map.locate({ setView: true, maxZoom: 16, watch: true });

        let gpsMarker = null;
        let gpsCircle = null;

        // Función que se ejecuta cuando el iPhone encuentra el GPS
        function onLocationFound(e) {
            if (gpsMarker) { map.removeLayer(gpsMarker); }
            if (gpsCircle) { map.removeLayer(gpsCircle); }

            gpsCircle = L.circle(e.latlng, e.accuracy).addTo(map);

            gpsMarker = L.circleMarker(e.latlng, {
                color: '#fff',          
                fillColor: '#007AFF',   
                fillOpacity: 1,
                radius: 8,
                weight: 3
            }).addTo(map);
        }

        map.on('locationfound', onLocationFound);

        map.on('locationerror', function(e) {
            alert("No se pudo acceder al GPS: " + e.message);
        });

        // Añadir botones de zoom abajo a la izquierda para no estorbar
        L.control.zoom({
            position: 'bottomleft' 
        }).addTo(map);

        // Añadir el mapa base de OpenStreetMap
        const mapaBase = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // CONTENEDORES DE CAPAS
        const grupoProvincia = L.layerGroup().addTo(map); 
        const capasMunicipios = {}; 
        let controlCapas; 

        // CARGAR PROVINCIA 
        const urlProvincia = 'https://servidor-mapas.onrender.com/api/mapa';

        fetch(urlProvincia)
            .then(response => {
                if (!response.ok) throw new Error('Error al cargar provincia');
                return response.json();
            })
            .then(data => {
                const capaProvincia = L.geoJSON(data, {
                    style: {
                        color: '#2563eb',      
                        weight: 3,              
                        opacity: 0.9,
                        fillColor: '#3b82f6',   
                        fillOpacity: 0.15      
                    },
                    onEachFeature: function (feature, layer) {
                        layer.bindPopup(`<strong>Límite Provincial de La Habana</strong>`);
                    }
                }).addTo(grupoProvincia);

                map.fitBounds(capaProvincia.getBounds());
            })
            .catch(error => console.error('Error cargando provincia:', error));

        // CARGAR MUNICIPIOS DINÁMICOS DESDE API
        const urlMunicipios = 'https://servidor-mapas.onrender.com/api/municipios';

        fetch(urlMunicipios)
            .then(response => {
                if (!response.ok) throw new Error('Error al cargar municipios');
                return response.json();
            })
            .then(data => {
                const nombresMunicipios = [...new Set(data.features.map(f => f.properties.nombre))].filter(Boolean);

                nombresMunicipios.forEach(nombreMuni => {
                    capasMunicipios[nombreMuni] = L.layerGroup().addTo(map);

                    L.geoJSON(data, {
                        filter: function(feature) {
                            return feature.properties.nombre === nombreMuni;
                        },
                        style: {
                            color: '#475569',      
                            weight: 1.5,
                            opacity: 0.9,
                            fillColor: '#' + Math.floor((Math.abs(Math.sin(nombreMuni.charCodeAt(0))) * 16777215) % 16777215).toString(16).padStart(6, '0'),
                            fillOpacity: 0.45      
                        },
                        onEachFeature: function (feature, layer) {
                            layer.bindPopup(`<strong>Municipio:</strong> ${nombreMuni}<br><em>ID Base de Datos:</em> ${feature.id}`);
                        }
                    }).addTo(capasMunicipios[nombreMuni]);
                });

                // CONSTRUCCIÓN DEL CONTROL DE CAPAS ORIGINAL
                const listaControles = {
                    "Límite Provincial": grupoProvincia
                };

                for (const nombre in capasMunicipios) {
                    listaControles[`Municipio: ${nombre}`] = capasMunicipios[nombre];
                }

                // Desplegamos el control nativo totalmente abierto tal como estaba
                controlCapas = L.control.layers(null, listaControles, { collapsed: false }).addTo(map);
                console.log("¡Panel de Smart Cities actualizado con éxito con los 15 municipios!");

   // Desplegamos el control nativo totalmente abierto tal como estaba
                controlCapas = L.control.layers(null, listaControles, { collapsed: false }).addTo(map);
                console.log("¡Panel de Smart Cities actualizado con éxito con los 15 municipios!");

                // ========================================================
                // 🟢 REEMPLAZO DEFINITIVO: ACTIVADOR INMANIBLE DEL BOTÓN PLUS
                // ========================================================
                function activarBotonMovil() {
                    const menuOriginal = document.querySelector('.leaflet-control-layers');
                    const botonPlus = document.getElementById('btn-toggle-capas');
                    
                    if (!menuOriginal || !botonPlus) {
                        // Si aún no se ha dibujado en la pantalla, reintentar en 50 milisegundos
                        setTimeout(activarBotonMovil, 50);
                        return;
                    }

                    console.log("¡Menú de Leaflet detectado y enlazado con el botón Plus!");

                    // Desactivar que el mapa interfiera con el menú y el botón
                    L.DomEvent.disableClickPropagation(botonPlus);
                    L.DomEvent.disableClickPropagation(menuOriginal);
                    L.DomEvent.disableScrollPropagation(menuOriginal);

                    // Forzar ocultamiento inicial si es móvil
                    if (window.innerWidth < 768) {
                        menuOriginal.classList.add('menu-escondido');
                    }
                    
                    // Evento al hacer clic en el botón
                    botonPlus.onclick = function(e) {
                        if (e) e.stopPropagation();
                        
                        menuOriginal.classList.toggle('menu-escondido');
                        
                        if (menuOriginal.classList.contains('menu-escondido')) {
                            botonPlus.innerText = '+';
                            botonPlus.style.backgroundColor = '#007aff';
                        } else {
                            botonPlus.innerText = '✕';
                            botonPlus.style.backgroundColor = '#ff3b30';
                        }
                    };

                    // Ocultar al tocar el mapa
                    map.on('click', function() {
                        if (window.innerWidth < 768 && !menuOriginal.classList.contains('menu-escondido')) {
                            menuOriginal.classList.add('menu-escondido');
                            botonPlus.innerText = '+';
                            botonPlus.style.backgroundColor = '#007aff';
                        }
                    });
                }

                // Arrancamos la busqueda del menú inmediatamente
                activarBotonMovil();

            })
            .catch(error => console.error('Error cargando la división municipal:', error));
    </script>
</body>
</html>
