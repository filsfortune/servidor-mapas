const map = L.map('map', {

map.locate({ setView: true, maxZoom: 16, watch: true });

// Variable para guardar el marcador del punto azul y no duplicarlo
let gpsMarker = null;
let gpsCircle = null;

// 2. Función que se ejecuta cuando el iPhone encuentra el GPS
function onLocationFound(e) {
    // Si ya existe el punto azul, lo quitamos para actualizar la posición
    if (gpsMarker) { map.removeLayer(gpsMarker); }
    if (gpsCircle) { map.removeLayer(gpsCircle); }

    // Círculo semitransparente que indica el margen de error/precisión
    gpsCircle = L.circle(e.latlng, e.accuracy).addTo(map);

    // Marcador estilizado como punto azul
    gpsMarker = L.circleMarker(e.latlng, {
        color: '#fff',          // Borde blanco
        fillColor: '#007AFF',   // Azul característico de iOS GPS
        fillOpacity: 1,
        radius: 8,
        weight: 3
    }).addTo(map);
}

// Escuchar el evento de ubicación encontrada
map.on('locationfound', onLocationFound);

// Manejar posibles errores (ej. si el usuario rechaza el permiso)
map.on('locationerror', function(e) {
    alert("No se pudo acceder al GPS: " + e.message);
});

        const urlProvincia = 'https://servidor-mapas.onrender.com/api/mapa';

                return response.json();
            })

                        color: '#2563eb',       // Borde azul

                        opacity: 0.9,
                        fillColor: '#3b82f6',   // Relleno azul
                        fillOpacity: 0.15       // Más transparente para dejar ver el fondo
                    },
                    onEachFeature: function (feature, layer) {
                        layer.bindPopup(`<strong>Límite Provincial de La Habana</strong>`);
                    }
                }).addTo(grupoProvincia);

                // Ajustar la cámara para que encuadre todo perfectamente al iniciar
                map.fitBounds(capaProvincia.getBounds());
            })
            .catch(error => console.error('Error cargando provincia:', error));

        // ========================================================
        const urlMunicipios = 'https://servidor-mapas.onrender.com/api/municipios';

            })

                const nombresMunicipios = [...new Set(data.features.map(f => f.properties.nombre))].filter(Boolean);

                nombresMunicipios.forEach(nombreMuni => {

                    L.geoJSON(data, {

                            return feature.properties.nombre === nombreMuni;

                            weight: 1.5,
                            opacity: 0.9,
                            // Genera un color hexadecimal fijo basado exclusivamente en las letras del nombre del municipio
                            fillColor: '#' + Math.floor((Math.abs(Math.sin(nombreMuni.charCodeAt(0))) * 16777215) % 16777215).toString(16).padStart(6, '0'),
                            fillOpacity: 0.45       // Transparencia ideal para contrastar datos urbanos de fondo
                        },
                        onEachFeature: function (feature, layer) {
                            layer.bindPopup(`<strong>Municipio:</strong> ${nombreMuni}<br><em>ID Base de Datos:</em> ${feature.id}`);
                        }
                    }).addTo(capasMunicipios[nombreMuni]);
                });
