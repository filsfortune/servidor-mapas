<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Portal de Datos Urbanos - La Habana</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link rel="stylesheet" href="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #map {
            height: 100svh; 
            width: 100%;
            position: relative;
            z-index: 1;
        }
        
        /* Panel flotante de información */
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            max-width: 300px;
        }
        .info-panel h1 { font-size: 18px; color: #333; margin-bottom: 5px; }
        .info-panel p { font-size: 12px; color: #666; }

        /* Contenedor de herramientas abajo a la izquierda */
        .contenedor-herramientas-izq {
            position: absolute;
            bottom: 25px;
            left: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 2000;
        }

        /* Estilo base para los botones circulares flotantes */
        .btn-flotante {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: white;
            border: none;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: transform 0.2s ease, background-color 0.2s ease, color 0.2s ease;
        }

        .btn-flotante:active {
            transform: scale(0.9);
        }

        /* Estados activos para saber qué herramienta está encendida */
        .btn-flotante.activo-medicion {
            background-color: #ff9500 !important; /* Naranja */
            color: white;
        }

        .btn-flotante.activo-poi {
            background-color: #34c759 !important; /* Verde */
            color: white;
        }

        /* Botón de control nativo del zoom (oculto por defecto o reubicado si lo deseas) */
        .leaflet-bar { border: none !important; box-shadow: none !important; }

        /* DISEÑO RESPONSIVO DEL BOTÓN PLUS (MÓVIL - DERECHA) */
        .boton-plus-movil {
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: #007aff; 
            color: white;
            font-size: 28px;
            font-weight: bold;
            border: none;
            box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.3);
            z-index: 2000; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        /* Ocultar la regla gris nativa del plugin para usar nuestro propio botón limpio */
        .polyline-measure-unicontrol {
            display: none !important;
        }

        /* Modificaciones exclusivas para pantallas móviles (iPhone) */
        @media (max-width: 767px) {
            .leaflet-control-layers {
                position: absolute !important;
                bottom: 95px !important; 
                right: 25px !important;
                margin: 0 !important;
                max-height: 50vh; 
                width: 280px;
                overflow-y: auto; 
                box-shadow: 0px 4px 15px rgba(0,0,0,0.25) !important;
                border: 1px solid #ddd !important;
                border-radius: 12px !important;
                padding: 15px !important;
                font-size: 16px !important; 
                transition: opacity 0.2s ease, transform 0.2s ease;
                transform-origin: bottom right;
            }

            .leaflet-control-layers.menu-escondido {
                opacity: 0 !important;
                pointer-events: none !important;
                transform: scale(0.85) translateY(15px);
            }
        }

        @media (min-width: 768px) {
            .boton-plus-movil { display: none; }
        }
    </style>
</head>
<body>

    <div class="info-panel">
        <h1>Mapa de La Habana</h1>
        <p>Municipios</p>
    </div>

    <div id="map"></div>

    <div class="contenedor-herramientas-izq">
        <button id="btn-herramienta-medir" class="btn-flotante" title="Medir Calles">📏</button>
        <button id="btn-herramienta-poi" class="btn-flotante" title="Agregar Puntos">📍</button>
    </div>

    <button id="btn-toggle-capas" class="boton-plus-movil">+</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script src="https://ppete2.github.io/Leaflet.PolylineMeasure/Leaflet.PolylineMeasure.js"></script>
    
    <script>
        // 1. Inicializar el mapa
        const map = L.map('map', { zoomControl: false }).setView([23.05, -82.40], 11);

        // GEOLOCALIZACIÓN FIJA
        map.locate({ setView: true, maxZoom: 15 });

        let gpsMarker = null;
        let gpsCircle = null;

        function onLocationFound(e) {
            if (gpsMarker) { map.removeLayer(gpsMarker); }
            if (gpsCircle) { map.removeLayer(gpsCircle); }
            gpsCircle = L.circle(e.latlng, e.accuracy).addTo(map);
            gpsMarker = L.circleMarker(e.latlng, {
                color: '#fff', fillColor: '#007AFF', fillOpacity: 1, radius: 8, weight: 3
            }).addTo(map);
        }
        map.on('locationfound', onLocationFound);

        // Añadir el mapa base de OpenStreetMap
        const mapaBase = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19, attribution: '© OpenStreetMap'
        }).addTo(map);

        // CONTENEDORES DE CAPAS GLOBALES
        const grupoProvincia = L.layerGroup().addTo(map); 
        const grupoPOIs = L.layerGroup().addTo(map); 
        const capasMunicipios = {}; 
        let controlCapas; 

        // Variables de estado para el control de flujos independientes
        let modoPoiActivo = false;

        // 🟢 Inicializar el objeto de medición (la regla nativa queda oculta por CSS)
        const medidorLineal = new L.Control.PolylineMeasure({
            position: 'bottomleft',
            unit: 'metres',
            showBearings: false,
            clearMeasurementsOnStop: true,
            showUnitControl: false
        });
        medidorLineal.addTo(map);


        // CARGAR PROVINCIA 
        const urlProvincia = 'https://servidor-mapas.onrender.com/api/mapa';
        fetch(urlProvincia)
            .then(response => response.json())
            .then(data => {
                const capaProvincia = L.geoJSON(data, {
                    style: { color: '#2563eb', weight: 3, opacity: 0.9, fillColor: '#3b82f6', fillOpacity: 0.15 }
                }).addTo(grupoProvincia);
                map.fitBounds(capaProvincia.getBounds());
            });

        // CARGAR MUNICIPIOS DINÁMICOS DESDE API
        const urlMunicipios = 'https://servidor-mapas.onrender.com/api/municipios';
        fetch(urlMunicipios)
            .then(response => response.json())
            .then(data => {
                const nombresMunicipios = [...new Set(data.features.map(f => f.properties.nombre))].filter(Boolean);

                nombresMunicipios.forEach(nombreMuni => {
                    capasMunicipios[nombreMuni] = L.layerGroup().addTo(map);
                    L.geoJSON(data, {
                        filter: function(feature) { return feature.properties.nombre === nombreMuni; },
                        style: {
                            color: '#475569', weight: 1.5, opacity: 0.9,
                            fillColor: '#' + Math.floor((Math.abs(Math.sin(nombreMuni.charCodeAt(0))) * 16777215) % 16777215).toString(16).padStart(6, '0'),
                            fillOpacity: 0.45      
                        },
                        onEachFeature: function (feature, layer) { layer.bindPopup(`<strong>Municipio:</strong> ${nombreMuni}`); }
                    }).addTo(capasMunicipios[nombreMuni]);
                });

                const listaControles = {
                    "Límite Provincial": grupoProvincia,
                    "Mis Puntos Guardados": grupoPOIs
                };
                for (const nombre in capasMunicipios) { listaControles[`Municipio: ${nombre}`] = capasMunicipios[nombre]; }

                controlCapas = L.control.layers(null, listaControles, { collapsed: false }).addTo(map);

                // ACTIVADOR DEL BOTÓN PLUS (MODO MÓVIL)
                function activarBotonMovil() {
                    const menuOriginal = document.querySelector('.leaflet-control-layers');
                    const botonPlus = document.getElementById('btn-toggle-capas');
                    if (!menuOriginal || !botonPlus) { setTimeout(activarBotonMovil, 50); return; }

                    L.DomEvent.disableClickPropagation(botonPlus);
                    L.DomEvent.disableClickPropagation(menuOriginal);

                    if (window.innerWidth < 768) { menuOriginal.classList.add('menu-escondido'); }
                    
                    botonPlus.onclick = function(e) {
                        if (e) e.stopPropagation();
                        menuOriginal.classList.toggle('menu-escondido');
                        botonPlus.innerText = menuOriginal.classList.contains('menu-escondido') ? '+' : '✕';
                        botonPlus.style.backgroundColor = menuOriginal.classList.contains('menu-escondido') ? '#007aff' : '#ff3b30';
                    };
                }
                activarBotonMovil();
            });


        // ========================================================
        // 🟢 LÓGICA DE HERRAMIENTAS SEPARADAS (MEDIR VS POI)
        // ========================================================
        const btnMedir = document.getElementById('btn-herramienta-medir');
        const btnPoi = document.getElementById('btn-herramienta-poi');

        // Aislar clicks en los botones de herramientas para que Leaflet no registre clicks fantasmas
        L.DomEvent.disableClickPropagation(btnMedir);
        L.DomEvent.disableClickPropagation(btnPoi);

        // --- ACCIÓN DEL BOTÓN MEDIR ---
        btnMedir.onclick = function(e) {
            if (e) e.stopPropagation();
            
            // Si la herramienta de POI estaba encendida, la apagamos primero
            if (modoPoiActivo) {
                modoPoiActivo = false;
                btnPoi.classList.remove('activo-poi');
            }

            // Alternar estado de medición
            if (btnMedir.classList.contains('activo-medicion')) {
                btnMedir.classList.remove('activo-medicion');
                medidorLineal._toggleControl(); // Apaga el plugin internamente
            } else {
                btnMedir.classList.add('activo-medicion');
                medidorLineal._toggleControl(); // Enciende el plugin internamente
            }
        };

        // --- ACCIÓN DEL BOTÓN PUNTOS DE INTERÉS (POI) ---
        btnPoi.onclick = function(e) {
            if (e) e.stopPropagation();

            // Si la herramienta de medición estaba encendida, la apagamos primero
            if (btnMedir.classList.contains('activo-medicion')) {
                btnMedir.classList.remove('activo-medicion');
                medidorLineal._toggleControl();
            }

            // Alternar estado de creación de POIs
            if (modoPoiActivo) {
                modoPoiActivo = false;
                btnPoi.classList.remove('activo-poi');
            } else {
                modoPoiActivo = true;
                btnPoi.classList.add('activo-poi');
                alert("Modo marcador activo: Toca cualquier parte del mapa para añadir un punto.");
            }
        };


        // --- CAPTURA DE CLICS EN EL MAPA PARA CREACIÓN ---
        map.on('click', function(e) {
            // Si el modo POI NO está activo, ignoramos por completo el clic
            if (!modoPoiActivo) return;

            const contenidoCrear = `
                <div style="font-family: 'Segoe UI', sans-serif; min-width: 180px;">
                    <strong style="display:block; margin-bottom:8px; color:#333;">Nuevo Punto</strong>
                    <input type="text" id="crear-titulo" placeholder="Título (Ej. Casa)" style="width:100%; padding:5px; margin-bottom:6px; border-radius:4px; border:1px solid #ccc; font-size:12px;">
                    <textarea id="crear-desc" placeholder="Descripción corta..." rows="2" style="width:100%; padding:5px; margin-bottom:8px; border-radius:4px; border:1px solid #ccc; font-size:12px; resize:none;"></textarea>
                    <button id="btn-guardar-poi" style="width:100%; background:#28a745; color:white; border:none; padding:6px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:12px;">Fijar Punto</button>
                </div>
            `;

            const popupCrear = L.popup().setLatLng(e.latlng).setContent(contenidoCrear).openOn(map);

            setTimeout(() => {
                const btnGuardar = document.getElementById('btn-guardar-poi');
                if (btnGuardar) {
                    btnGuardar.onclick = function() {
                        const titulo = document.getElementById('crear-titulo').value || 'Punto sin título';
                        const desc = document.getElementById('crear-desc').value || 'Sin descripción';

                        const nuevoMarcador = L.marker(e.latlng).addTo(grupoPOIs);
                        nuevoMarcador.datosPOI = { titulo: titulo, descripcion: desc };

                        function renderizarPopupLectura(marcador) {
                            const htmlLectura = `
                                <div style="font-family: 'Segoe UI', sans-serif; min-width: 160px;">
                                    <h3 style="margin:0 0 4px 0; font-size:14px; color:#333;">${marcador.datosPOI.titulo}</h3>
                                    <p style="margin:0 0 12px 0; font-size:12px; color:#666;">${marcador.datosPOI.descripcion}</p>
                                    <div style="display:flex; gap:6px;">
                                        <button class="btn-editar-poi" style="flex:1; background:#007aff; color:white; border:none; padding:4px; border-radius:4px; font-size:11px; cursor:pointer; font-weight:bold;">✏️ Editar</button>
                                        <button class="btn-borrar-poi" style="flex:1; background:#dc3545; color:white; border:none; padding:4px; border-radius:4px; font-size:11px; cursor:pointer; font-weight:bold;">🗑️ Borrar</button>
                                    </div>
                                </div>
                            `;
                            marcador.bindPopup(htmlLectura);
                        }

                        renderizarPopupLectura(nuevoMarcador);

                        nuevoMarcador.on('popupopen', function() {
                            const btnBorrar = document.querySelector('.btn-borrar-poi');
                            if (btnBorrar) { btnBorrar.onclick = function() { grupoPOIs.removeLayer(nuevoMarcador); }; }

                            const btnEditar = document.querySelector('.btn-editar-poi');
                            if (btnEditar) {
                                btnEditar.onclick = function() {
                                    const htmlEdicion = `
                                        <div style="font-family: 'Segoe UI', sans-serif; min-width: 180px;">
                                            <strong style="display:block; margin-bottom:6px; color:#333;">Editar Datos</strong>
                                            <input type="text" id="edit-titulo" value="${nuevoMarcador.datosPOI.titulo}" style="width:100%; padding:5px; margin-bottom:6px; border-radius:4px; border:1px solid #ccc; font-size:12px;">
                                            <textarea id="edit-desc" rows="2" style="width:100%; padding:5px; margin-bottom:8px; border-radius:4px; border:1px solid #ccc; font-size:12px; resize:none;">${nuevoMarcador.datosPOI.descripcion}</textarea>
                                            <button id="btn-actualizar-poi" style="width:100%; background:#ff9500; color:white; border:none; padding:6px; border-radius:4px; font-weight:bold; cursor:pointer; font-size:12px;">Actualizar</button>
                                        </div>
                                    `;
                                    nuevoMarcador.setPopupContent(htmlEdicion);

                                    setTimeout(() => {
                                        const btnActualizar = document.getElementById('btn-actualizar-poi');
                                        if (btnActualizar) {
                                            btnActualizar.onclick = function() {
                                                nuevoMarcador.datosPOI.titulo = document.getElementById('edit-titulo').value || 'Sin título';
                                                nuevoMarcador.datosPOI.descripcion = document.getElementById('edit-desc').value || 'Sin descripción';
                                                renderizarPopupLectura(nuevoMarcador);
                                                map.closePopup();
                                            };
                                        }
                                    }, 50);
                                };
                            }
                        });

                        map.closePopup(popupCrear);
                    };
                }
            }, 100);
        });
    </script>
</body>
</html>
