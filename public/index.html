<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Datos Urbanos - La Habana</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map {
            height: 100vh;
            width: 100%;
        }
        
        /* Panel flotante de información */
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            max-width: 300px;
        }
        .info-panel h1 { font-size: 18px; color: #333; margin-bottom: 5px; }
        .info-panel p { font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <div class="info-panel">
        <h1>Infraestructura Urbana</h1>
        <p>Capa espacial de la provincia de La Habana cargada en tiempo real desde PostGIS (Neon).</p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // 1. Inicializar el mapa centrado en La Habana
        const map = L.map('map').setView([23.05, -82.40], 11);

        // 2. Añadir el mapa base de OpenStreetMap
        const mapaBase = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // ========================================================
        // 1. CONTENEDORES DE CAPAS GLOBALES
        // ========================================================
        const grupoProvincia = L.layerGroup().addTo(map); // Capa base provincial
        const capasMunicipios = {}; // Almacén dinámico para los 15 municipios (Declarado UNA sola vez)
        let controlCapas; // Control maestro del panel de la derecha

        // ========================================================
        // 3. CARGAR PROVINCIA (Color Azul / Gris Elegante de fondo)
        // ========================================================
        const urlProvincia = 'https://servidor-mapas.onrender.com/api/mapa';

        fetch(urlProvincia)
            .then(response => {
                if (!response.ok) throw new Error('Error al cargar provincia');
                return response.json();
            })
            .then(data => {
                const capaProvincia = L.geoJSON(data, {
                    style: {
                        color: '#1e3a8a',       // Borde azul oscuro
                        weight: 2.5,            // Línea más gruesa para resaltar la provincia entera
                        fillColor: '#3b82f6',   // Relleno azul moderno institucional
                        fillOpacity: 0.1        // Muy transparente para que no opaque a los municipios internos
                    },
                    onEachFeature: function (feature, layer) {
                        layer.bindPopup(`<strong>Límite Provincial de La Habana</strong>`);
                    }
                }).addTo(grupoProvincia);

                // Ajustar la cámara automáticamente para encuadrar la provincia al iniciar
                map.fitBounds(capaProvincia.getBounds());
            })
            .catch(error => console.error('Error cargando provincia:', error));

        // ========================================================
        // 4. CARGAR MUNICIPIOS DINÁMICOS DESDE TU API DE NEON
        // ========================================================
        const urlMunicipios = 'https://servidor-mapas.onrender.com/api/municipios';

        fetch(urlMunicipios)
            .then(response => {
                if (!response.ok) throw new Error('Error al cargar municipios');
                return response.json();
            })
            .then(data => {
                // Extraemos los 15 nombres únicos reales devueltos por el server.js
                const nombresMunicipios = [...new Set(data.features.map(f => f.properties.nombre))].filter(Boolean);

                // Recorremos cada nombre para procesar su geometría e inyectar color único
                nombresMunicipios.forEach(nombreMuni => {
                    
                    // Inicializamos la capa independiente en el mapa para este municipio activo
                    capasMunicipios[nombreMuni] = L.layerGroup().addTo(map);

                    // Filtramos el GeoJSON completo para renderizar únicamente este municipio en su capa
                    L.geoJSON(data, {
                        filter: function(feature) {
                            return feature.properties.nombre === nombreMuni;
                        },
                        style: {
                            color: '#475569',       // Borde gris oscuro limpio para separar colindancias
                            weight: 1.5,
                            // Magia matemática: Genera un color hexadecimal fijo basado exclusivamente en las letras del nombre
                            fillColor: '#' + Math.floor((Math.abs(Math.sin(nombreMuni.charCodeAt(0))) * 16777215) % 16777215).toString(16).padStart(6, '0'),
                            fillOpacity: 0.45       // Transparencia ideal para contrastar datos y ver calles de fondo
                        },
                        onEachFeature: function (feature, layer) {
                            layer.bindPopup(`<strong>Municipio:</strong> ${nombreMuni}<br><em>Fid PostGIS:</em> ${feature.properties.fid}`);
                        }
                    }).addTo(capasMunicipios[nombreMuni]);
                });

                // ========================================================
// 5. CONSTRUCCIÓN ASINCRÓNICA DEL CONTROL DE CAPAS
// ========================================================
const listaControles = {
    "Límite Provincial": grupoProvincia
};

// Insertamos dinámicamente cada uno de los 15 municipios con su checkbox independiente
for (const nombre in capasMunicipios) {
    listaControles[`Municipio: ${nombre}`] = capasMunicipios[nombre];
}

// Desplegamos el control en la esquina superior derecha totalmente abierto (collapsed: false)
controlCapas = L.control.layers(null, listaControles, { collapsed: false }).addTo(map);
               
    </script>
</body>
</html>
