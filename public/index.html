<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Datos Urbanos - La Habana</title>
    
    <!-- Estilos de Leaflet para el mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #map {
    height: 100vh; /* O usa un tamaño fijo como 600px */
    width: 100%;
}
        
        /* Panel flotante de información */
        .info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 1000;
            max-width: 300px;
        }
        .info-panel h1 { font-size: 18px; color: #333; margin-bottom: 5px; }
        .info-panel p { font-size: 12px; color: #666; }
    </style>
</head>
<body>

    <div class="info-panel">
        <h1>Infraestructura Urbana</h1>
        <p>Capa espacial de la provincia de La Habana cargada en tiempo real desde PostGIS (Neon).</p>
    </div>

    <div id="map"></div>

    <!-- Script de Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
      // 1. Inicializar el mapa centrado de forma general
const map = L.map('map').setView([23.05, -82.40], 11);

// 2. Añadir el mapa base de OpenStreetMap
const mapaBase = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
}).addTo(map);

// ========================================================
// CONTENEDORES DE CAPAS (Grupos lógicos)
// ========================================================
const grupoProvincia = L.layerGroup().addTo(map); // Se enciende por defecto
const grupoMunicipios = L.layerGroup().addTo(map); // Se enciende por defecto

// ========================================================
// 3. CARGAR PROVINCIA (Color Azul Moderno)
// ========================================================
const urlProvincia = 'https://servidor-mapas.onrender.com/api/mapa';

fetch(urlProvincia)
    .then(response => {
        if (!response.ok) throw new Error('Error al cargar provincia');
        return response.json();
    })
    .then(data => {
        const capaProvincia = L.geoJSON(data, {
            style: {
                color: '#2563eb',       // Borde azul
                weight: 3,              // Borde más grueso por ser el límite mayor
                opacity: 0.9,
                fillColor: '#3b82f6',   // Relleno azul
                fillOpacity: 0.15       // Más transparente para dejar ver el fondo
            },
            onEachFeature: function (feature, layer) {
                layer.bindPopup(`<strong>Límite Provincial de La Habana</strong>`);
            }
        }).addTo(grupoProvincia);

        // Ajustar la cámara para que encuadre todo perfectamente al iniciar
        map.fitBounds(capaProvincia.getBounds());
    })
    .catch(error => console.error('Error cargando provincia:', error));

// ========================================================
// CONTENEDOR PRINCIPAL PARA LOS MUNICIPIOS
// ========================================================
// Creamos un objeto vacío donde guardaremos el grupo de capa de cada municipio
const capasMunicipios = {}; 

// [El Paso 3 de la Provincia se queda exactamente igual en tu código]

// ========================================================
// 4. CARGAR MUNICIPIOS DE FORMA DINÁMICA DESDE LA API
// ========================================================
const urlMunicipios = 'https://servidor-mapas.onrender.com/api/municipios';

// Objeto global donde guardaremos las capas de cada municipio
const capasMunicipios = {}; 
let controlCapas; // Variable global para el panel de la derecha

fetch(urlMunicipios)
    .then(response => {
        if (!response.ok) throw new Error('Error al cargar municipios');
        return response.json();
    })
    .then(data => {
        // 1. Extraemos todos los nombres únicos que guardaste en QGIS/Neon
        const nombresMunicipios = [...new Set(data.features.map(f => f.properties.nombre))].filter(Boolean);

        // 2. Creamos una capa independiente para cada municipio encontrado
        nombresMunicipios.forEach(nombreMuni => {
            
            // Creamos el grupo de mapa para este municipio y lo encendemos de inicio
            capasMunicipios[nombreMuni] = L.layerGroup().addTo(map);

            // Filtramos el GeoJSON para meter en este grupo SOLO los polígonos de este municipio
            L.geoJSON(data, {
                filter: function(feature) {
                    return feature.properties.nombre === nombreMuni;
                },
                style: {
                    color: '#ea580c',       // Borde naranja oscuro para marcar el límite
                    weight: 2,              // Grosor de la línea de división
                    fillColor: '#f97316',   // Relleno naranja
                    fillOpacity: 0.35       // Transparencia perfecta para ver las calles
                },
                onEachFeature: function (feature, layer) {
                    // Mensaje emergente al hacer clic
                    layer.bindPopup(`<strong>Municipio:</strong> ${nombreMuni}`);
                }
            }).addTo(capasMunicipios[nombreMuni]);
        });

        // ========================================================
        // 5. CONSTRUIR EL PANEL DE CONTROL (Justo aquí adentro)
        // ========================================================
        // Preparamos la lista de controles empezando por la Provincia
        const listaControles = {
            "Límite Provincial": grupoProvincia
        };

        // Recorremos nuestro objeto de capas y metemos cada municipio con su nombre real
        for (const nombre in capasMunicipios) {
            listaControles[`Municipio: ${nombre}`] = capasMunicipios[nombre];
        }

        // Creamos el panel flotante blanco en la esquina superior derecha con la lista completa
        controlCapas = L.control.layers(null, listaControles, { collapsed: false }).addTo(map);

        console.log("¡Panel de control generado con éxito para los municipios:", nombresMunicipios);
    })
    .catch(error => console.error('Error cargando la división municipal:', error));
    </script>
</body>
</html>
